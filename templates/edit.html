{% extends "base.html" %}
{% block title %}Todo 編集{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Todo 編集</h1>
  <a href="{{ url_for('index') }}" class="btn btn-secondary">← 一覧へ戻る</a>
</div>

<form method="post" class="todo-form">
  <div class="form-group">
    <label for="title">タイトル <span class="required">*</span></label>
    <input type="text" id="title" name="title" required value="{{ todo['タイトル'] }}">
  </div>

  <div class="form-group">
    <label for="content">内容</label>
    <textarea id="content" name="content" rows="4">{{ todo['内容'] }}</textarea>
  </div>

  <div class="form-group">
    <label for="due_date">期日</label>
    <input type="date" id="due_date" name="due_date" value="{{ todo['期日'] }}">
  </div>

  <div class="form-group">
    <label for="priority">重要度</label>
    <select id="priority" name="priority">
      <option value="高" {{ 'selected' if todo['重要度'] == '高' else '' }}>高</option>
      <option value="中" {{ 'selected' if todo['重要度'] == '中' else '' }}>中</option>
      <option value="低" {{ 'selected' if todo['重要度'] == '低' else '' }}>低</option>
    </select>
  </div>

  <div class="form-group">
    <label for="category">カテゴリ</label>
    <select id="category" name="category">
      {% for cat in categories %}
      <option value="{{ cat }}" {{ 'selected' if todo['カテゴリ'] == cat else '' }}>{{ cat }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">更新する</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">キャンセル</a>
  </div>
</form>
{% endblock %}
