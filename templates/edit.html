{% extends "base.html" %}
{% block title %}Todo 編集{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Todo 編集</h1>
  <a href="{{ url_for('index') }}" class="btn btn-secondary">← 一覧へ戻る</a>
</div>

<form method="post" class="todo-form">
  <div class="form-group">
    <label for="title">タイトル <span class="required">*</span></label>
    <input type="text" id="title" name="title" required value="{{ todo['タイトル'] }}">
  </div>

  <div class="form-group">
    <label for="content">内容</label>
    <textarea id="content" name="content" rows="4">{{ todo['内容'] }}</textarea>
  </div>

  <div class="form-group">
    <label for="due_date">期日</label>
    <input type="date" id="due_date" name="due_date" value="{{ todo['期日'] }}">
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">更新する</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">キャンセル</a>
  </div>
</form>
{% endblock %}
